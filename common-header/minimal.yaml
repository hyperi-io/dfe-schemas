# Common header profile: minimal
#
# High-volume structured data - metrics, flow records.
#
# Requires: ClickHouse 26.2+ (JSON type GA)

current: "1.0.0"
resource_type: core

versions:
  "1.0.0":
    date: "2026-06-10"
    type: model
    summary: "JSON max_dynamic_paths=2048, CH 26.2+ hard deck"
    columns:
      - name: _timestamp_load
        type: timestamp
        default: "now64(3)"
        order: 0
        expr: "@generated: now64(3)"
        comment: "Insertion timestamp (ms precision)"
        _field_type: base

      - name: _timestamp
        type: timestamp
        use_case: range
        order: 1
        expr: "@source: timestamp | now()"
        comment: "Event timestamp from source data"
        _field_type: base

      - name: _uuid
        type: uuid
        default: "generateUUIDv7()"
        expr: "@generated: generateUUIDv7()"
        comment: "Time-ordered unique event identifier"
        _field_type: base

      - name: _org_id
        type: string
        attribute: [lowcardinality, not_null]
        use_case: dimension
        order: 2
        expr: "@source: org_id"
        comment: "Tenant/organisation identifier"
        _field_type: base

      - name: _json
        type: json
        max_dynamic_paths: 2048
        expr: "@captured: raw_payload as JSON"
        comment: "Original event payload as structured JSON"
        _field_type: base
