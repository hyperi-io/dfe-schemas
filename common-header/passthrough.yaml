# Common header profile: passthrough
#
# Transparent bridge — no timestamp injection.

current: "1.0.0"

versions:
  "1.0.0":
    date: "2026-01-15"
    type: model
    summary: "Initial 4-column passthrough header"
    columns:
      - name: _timestamp_load
        type: timestamp
        default: "now64(3)"
        order: 0
        expr: "@generated: now64(3)"
        comment: "Insertion timestamp (ms precision)"

      - name: _uuid
        type: uuid
        default: "generateUUIDv7()"
        expr: "@generated: generateUUIDv7()"
        comment: "Time-ordered unique event identifier"

      - name: _org_id
        type: string
        attribute: [lowcardinality]
        use_case: dimension
        order: 1
        expr: "@source: org_id"
        comment: "Tenant/organisation identifier"

      - name: _json
        type: json
        expr: "@captured: raw_payload as JSON"
        comment: "Original event payload as structured JSON"
