# Common header profile: timeseries (default)
#
# Full event ingestion — logs, alerts, audit trails.

current: "1.0.0"

versions:
  "1.0.0":
    date: "2026-01-15"
    type: model
    summary: "Initial 9-column common header"
    columns:
      - name: _timestamp_load
        type: timestamp
        default: "now64(3)"
        order: 0
        expr: "@generated: now64(3)"
        comment: "Insertion timestamp (ms precision)"

      - name: _timestamp
        type: datetime
        use_case: range
        order: 1
        expr: "@source: timestamp | now()"
        comment: "Event timestamp from source data"

      - name: _timestamp_received
        type: datetime
        expr: "@source: first(timestamp_received/received_at)"
        comment: "When the event was first received by the collector"

      - name: _uuid
        type: uuid
        default: "generateUUIDv7()"
        expr: "@generated: generateUUIDv7()"
        comment: "Time-ordered unique event identifier"

      - name: _org_id
        type: string
        attribute: [lowcardinality]
        use_case: dimension
        order: 2
        expr: "@source: org_id"
        comment: "Tenant/organisation identifier"

      - name: _source
        type: string
        attribute: [lowcardinality]
        use_case: dimension
        order: 3
        expr: "@source: first(_source) | topic_name"
        comment: "Data source label (e.g. syslog, crowdstrike_edr)"

      - name: _raw
        type: text
        use_case: text_search
        expr: "@captured: raw_payload"
        comment: "Original event payload as text"

      - name: _json
        type: json
        expr: "@captured: raw_payload as JSON"
        comment: "Original event payload as structured JSON"

      - name: _tags
        type: json
        expr: "@source: first(tags/_tags/meta/metadata.tags)"
        comment: "Event metadata tags"
