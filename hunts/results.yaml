# Hunt detection output columns
#
# Appended after common header columns in the hunt results table.
# These define the lean output for scheduled detection rules:
# matched record UUID + rule metadata.

current: "1.0.0"

versions:
  "1.0.0":
    date: "2026-06-10"
    type: model
    summary: "Initial 6-column hunt detection schema"
    columns:
      - name: matched_uuid
        type: uuid
        comment: "UUID of the matching source record"

      - name: rule_id
        type: string
        attribute: [lowcardinality]
        comment: "Rule identifier"

      - name: rule_name
        type: string
        attribute: [lowcardinality]
        comment: "Human-readable rule name"

      - name: source_table
        type: string
        attribute: [lowcardinality]
        comment: "Source table that was scanned"

      - name: hunt_name
        type: string
        attribute: [lowcardinality]
        comment: "Parent hunt name"

      - name: severity
        type: string
        attribute: [lowcardinality]
        comment: "Detection severity"
