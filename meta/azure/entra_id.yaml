# Meta schema: Azure Entra ID
#
# Entra ID audit logs — combined sign-in logs and directory audit events.
# Records from both types are stored in the same table with a record_type
# discriminator. Fields specific to one type are nullable.

current: "1.0.0"

versions:
  "1.0.0":
    date: "2026-03-03"
    type: model
    summary: "Initial Entra ID combined schema (signIns + directoryAudits)"
    columns:
      - name: record_type
        type: string
        attribute: [lowcardinality, not_null]
        use_case: dimension
        expr: "@computed: if(has(activityDisplayName), 'directory_audit', 'signin')"
        comment: "Record type discriminator (signin or directory_audit)"

      - name: event_id
        type: string
        use_case: bloom
        expr: "@source: id"
        comment: "Unique event identifier"

      - name: event_time
        type: datetime
        use_case: range
        expr: "@source: first(createdDateTime/activityDateTime)"
        comment: "Event timestamp (createdDateTime for signIns, activityDateTime for audits)"

      - name: user_principal_name
        type: string
        use_case: dimension
        expr: "@source: first(userPrincipalName/initiatedBy.user.userPrincipalName)"
        comment: "User principal name (UPN / email)"

      - name: user_id
        type: string
        attribute: [nullable]
        use_case: dimension
        expr: "@source: first(userId/initiatedBy.user.id)"
        comment: "Entra ID user object identifier"

      - name: app_display_name
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: appDisplayName"
        comment: "Application display name (signIns only)"

      - name: ip_address
        type: ip
        attribute: [nullable]
        use_case: range
        expr: "@source: ipAddress"
        comment: "Client IP address (signIns only)"

      - name: status_error_code
        type: integer
        attribute: [nullable]
        use_case: dimension
        expr: "@source: status.errorCode"
        comment: "Sign-in error code (0 = success, signIns only)"

      - name: operation_type
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: operationType"
        comment: "Operation type (Add, Delete, Update — directoryAudits only)"

      - name: activity_display_name
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: activityDisplayName"
        comment: "Activity display name (directoryAudits only)"

      - name: result
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: result"
        comment: "Operation result (success, failure — directoryAudits only)"

      - name: location_country
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: location.countryOrRegion"
        comment: "Country or region of the sign-in (signIns only)"
