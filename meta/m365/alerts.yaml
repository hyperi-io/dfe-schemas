# Meta schema: M365 Security Alerts
#
# Graph Security alerts v2 — all security alert types across M365 services.

current: "1.0.0"
resource_type: core

versions:
  "1.0.0":
    date: "2026-03-03"
    type: model
    summary: "Initial M365 Security Alerts schema"
    columns:
      - name: alert_id
        type: string
        use_case: bloom
        expr: "@source: id"
        comment: "Unique alert identifier"
        _field_type: base

      - name: title
        type: string
        expr: "@source: title"
        comment: "Alert title"
        _field_type: base

      - name: category
        type: string
        attribute: [lowcardinality]
        use_case: dimension
        expr: "@source: category"
        comment: "Alert category"
        _field_type: base

      - name: severity
        type: string
        attribute: [lowcardinality]
        use_case: dimension
        expr: "@source: severity"
        comment: "Alert severity (high, medium, low)"
        _field_type: base

      - name: status
        type: string
        attribute: [lowcardinality]
        use_case: dimension
        expr: "@source: status"
        comment: "Alert status (newAlert, inProgress, resolved, dismissed)"
        _field_type: base

      - name: created_datetime
        type: datetime
        use_case: range
        expr: "@source: createdDateTime"
        comment: "When the alert was created"
        _field_type: base

      - name: description
        type: text
        attribute: [nullable]
        use_case: fulltext
        expr: "@source: description"
        comment: "Alert description"
        _field_type: base

      - name: provider
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: vendorInformation.provider"
        comment: "Security provider that generated the alert"
        _field_type: base

      - name: determination
        type: string
        attribute: [lowcardinality, nullable]
        use_case: dimension
        expr: "@source: determination"
        comment: "Threat assessment determination"
        _field_type: base
